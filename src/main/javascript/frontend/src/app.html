<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        const storageKey = 'dlab-theme-preference';
        const defaultPreference = 'system';

        let storedPreference = null;

        try {
          storedPreference = localStorage.getItem(storageKey);
        } catch (error) {
          storedPreference = null;
        }

        const preference = storedPreference === 'light' || storedPreference === 'dark' || storedPreference === 'system'
          ? storedPreference
          : defaultPreference;
        const dark = preference === 'dark' || (preference === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        const currentTheme = dark ? 'dark' : 'light';

        const root = document.documentElement;
        root.style.colorScheme = currentTheme;
        root.classList.toggle('dark', dark);
        root.classList.toggle('light', !dark);
        root.setAttribute('data-theme', currentTheme);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Goudy+Bookletter+1911&family=Roboto:wght@400;500&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
